<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Farmacia</title>

    <link rel="stylesheet" href="ventas.css">
</head>

<body>

    <div class="contenedor">

        <h1>Farmacia Bendición de Dios</h1>

        <h2>Pantalla de Ventas</h2>

        <div class="formulario">

            <input type="text" placeholder="Nombre del medicamento">

            <input type="number" placeholder="Cantidad">

            <button>Agregar</button>

        </div>

        <table>

            <thead>
                <tr>
                    <th>Medicamento</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Acetaminofén</td>
                    <td>2</td>
                    <td>$10.000</td>
                </tr>
            </tbody>

        </table>

        <h3>Total: $10.000</h3>

        <button class="btn-vender">Vender</button>

    </div>

</body>
</html>
