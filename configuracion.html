<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - Farmacia</title>

    <link rel="stylesheet" href="configuracion.css">
</head>

<body>

    <div class="sidebar">

        <h2>Farmacia</h2>

        <ul>
            <li>🏠 Inicio</li>
            <li>💊 Inventario</li>
            <li>🛒 Ventas</li>
            <li>👥 Clientes</li>
            <li>📊 Reportes</li>
            <li>⚙ Configuración</li>
        </ul>

    </div>

    <div class="main">

        <div class="topbar">

            <h1>Farmacia Bendición de Dios</h1>

        </div>

        <div class="contenedor">

            <h2>Configuración del Sistema</h2>

            <div class="formulario">

                <label>Nombre de la farmacia</label>
                <input type="text" value="Farmacia Bendición de Dios">

                <label>Dirección</label>
                <input type="text" value="Medellín - Colombia">

                <label>Teléfono</label>
                <input type="text" value="3001234567">

                <label>Correo electrónico</label>
                <input type="email" value="farmacia@gmail.com">

                <label>Nueva contraseña</label>
                <input type="password" placeholder="Ingrese nueva contraseña">

                <button>Guardar Cambios</button>

            </div>

        </div>

    </div>

</body>
</html>
