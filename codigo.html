<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="contenedor">

        <div class="header">

            <img src="https://cdn-icons-png.flaticon.com/512/2966/2966486.png">

            <h1>Farmacia La Bendición de Dios</h1>

            <p>Sistema de Gestión</p>

        </div>

        <div class="contenido">

            <input type="text"
                   class="buscador"
                   placeholder="Buscar medicamento">

            <button class="boton medicamentos">
                Medicamentos
            </button>

            <button class="boton ventas">
                Ventas
            </button>

            <button class="boton inventario">
                Inventario
            </button>

            <button class="boton clientes">
                Clientes
            </button>

        </div>

    </div>

</body>
</html>
